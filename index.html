<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FDMessage</title>
    <style>
        body {
            background: rgb(19, 19, 93);
            margin: 20px 20px 70px 20px;
        }
        #chat-window {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 80px;
        }
        .input-bar {
            z-index: 100;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: darkcyan;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgb(86, 86, 86);
            box-sizing: border-box;
        }
        .input-bar input {
            flex-grow: 1;
            border-radius: 10px;
            padding: 10px;
            border: none;
            font-family: sans-serif;
            font-size: 20px;
        }
        button {
            background-color: rgb(0, 183, 183);
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-size: 20px;
        }
        button:hover {
            background-color: lightcyan;
            color: black;
            transform: scale(1.1);
        }
        .box, .friend {
            font-family: sans-serif;
            padding: 10px;
            width: fit-content;
            max-width: 70%;
            word-wrap: break-word;
            animation: popIn 0.3s ease-out;
            transition: 0.2s;
            font-size: 20px;
        }
        .box {
            background-color: cadetblue;
            color: white;
            margin-right: auto;
            border-radius: 18px 18px 18px 2px;
        }
        .box:hover, .friend:hover {
            background-color: rgb(22, 192, 192); 
            transform: scale(1.05);
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }  
        .friend {
            background-color: cornflowerblue;
            color: white;
            margin-left: auto;
            border-radius: 18px 18px 2px 18px;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <div id="chat-window"></div>

    <div class="input-bar">
        <input type="text" placeholder="Send a message...">
        <label style="color: white; font-size: 14px; cursor: pointer;">
            <input type="checkbox" id="isFriend"> друн
        </label>
        <button id="download-btn">Download a chat</button>
        <button id="sendBtn">Send</button>
    </div>
