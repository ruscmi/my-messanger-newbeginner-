<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FDMessage</title>
    <style>
        body {
            background: linear-gradient(rgb(54, 54, 112),rgb(24, 24, 75));
            margin: 20px 20px 70px 20px;
        }
        @keyframes gradientBG {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
        }
        #chat-window {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 80px;
        }
        .input-bar {
            z-index: 100;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: darkcyan;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgb(86, 86, 86);
            box-sizing: border-box;
        }
        .input-bar input {
            flex-grow: 1;
            border-radius: 10px;
            padding: 10px;
            border: none;
            font-family: sans-serif;
        }
        button {
            background-color: rgb(0, 183, 183);
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }
        button:hover {
            background-color: lightcyan;
            color: black;
            transform: scale(1.1);
        }
        .box, .friend {
            font-family: sans-serif;
            padding: 10px;
            width: fit-content;
            max-width: 70%;
            word-wrap: break-word;
            animation: popIn 0.3s ease-out;
            transition: 0.2s;
        }
        .box {
            background-color: cadetblue;
            color: white;
            margin-right: auto;
            border-radius: 18px 18px 18px 2px;
        }
        .box:hover, .friend:hover {
        background-color: rgb(22, 192, 192); 
        transform: scale(1.05);
        cursor: pointer; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }  
        .friend {
            background-color: cornflowerblue;
            color: white;
            margin-left: auto;
            border-radius: 18px 18px 2px 18px;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <div id="chat-window">
        </div>

    <div class="input-bar">
        <input type="text" placeholder="Send a message...">
        <label style="color: white; font-size: 14px; cursor: pointer;">
            <input type="checkbox" id="isFriend"> друн
        </label>
        <button id="sendBtn">Send</button>
    </div>

    <script>
        let messages = JSON.parse(localStorage.getItem('ChatHistory')) || [];
        let chat = document.querySelector('#chat-window');
        let fButton = document.querySelector('#sendBtn');
        let inp = document.querySelector('input');
        function renderMessage(msgData) {
            let newMessage = document.createElement('div');
            newMessage.classList.add(msgData.isFriend ? 'friend' : 'box');

            let nameLabel = document.createElement('div');
            nameLabel.style.fontSize = "10px";
            nameLabel.style.marginBottom = "4px";
            nameLabel.style.opacity = "0.7";
            nameLabel.innerText = msgData.isFriend ? "Friend" : "Me";

            let textContainer = document.createElement('div');
            textContainer.innerText = msgData.text;

            newMessage.appendChild(nameLabel);
            newMessage.appendChild(textContainer);

            newMessage.onclick = function() {
            if (confirm("Удалить сообщение?")) {
            messages = messages.filter(m => m.id !==msgData.id)
            localStorage.setItem('ChatHistory',JSON.stringify(messages));
            newMessage.remove()
            }
            }
            chat.appendChild(newMessage);
            let timeLabel = document.createElement('div');
            timeLabel.style.fontSize="9px";
            timeLabel.style.textAlign="right";
            timeLabel.style.marginTop="4px";
            timeLabel.style.opacity="0.5";
            timeLabel.innerText=msgData.time || "";

            newMessage.appendChild(timeLabel);
        }

        messages.forEach(renderMessage);

        fButton.onclick = function() {
        let inp = document.querySelector('input');
        let text = inp.value;

        if (text !== "") {
        let isFriendCheck = document.querySelector('#isFriend');
        
        let messageData = {
            text: text,
            isFriend: isFriendCheck.checked,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            id: Date.now()
        };

        renderMessage(messageData); 
        messages.push(messageData); 
        localStorage.setItem('ChatHistory', JSON.stringify(messages));
        
        inp.value = "";
        window.scrollTo(0, document.body.scrollHeight);
        } 
        };

        inp.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') fButton.click();
        });
    </script>
</body>
</html>
