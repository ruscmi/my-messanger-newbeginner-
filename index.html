<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FDMessage</title>
    <style>
        body {
        background-color: #f0f0f0;
        margin: 0;
        padding: 0;
        }
        #chat-window {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 100px;
        }
        .input-bar {
            z-index: 100;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: darkcyan;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgb(86, 86, 86);
            box-sizing: border-box;
        }
        .input-bar input {
            flex-grow: 1;
            border-radius: 10px;
            padding: 10px;
            border: none;
            font-family: sans-serif;
            font-size: 20px;
        }
        button {
            background-color: rgb(0, 183, 183);
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-size: 20px;
        }
        button:hover {
            background-color: lightcyan;
            color: black;
            transform: scale(1.1);
        }
        .box, .friend {
            font-family: sans-serif;
            padding: 10px;
            width: fit-content;
            max-width: 70%;
            word-wrap: break-word;
            animation: popIn 0.3s ease-out;
            transition: 0.2s;
            font-size: 20px;
        }
        .box {
            background-color: cadetblue;
            color: white;
            margin-right: auto;
            border-radius: 18px 18px 18px 2px;
        }
        .box:hover, .friend:hover {
            background-color: rgb(22, 192, 192); 
            transform: scale(1.05);
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }  
        .friend {
            background-color: cadetblue;
            color: white;
            margin-left: auto;
            border-radius: 18px 18px 2px 18px;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <div id="chat-window"></div>

    <div class="input-bar">
        <input type="text" placeholder="Send a message...">
        <label style="color: white; font-size: 14px; cursor: pointer;">
            <input type="checkbox" id="isFriend"> друн
        </label>
        <button id="download-btn">Download a chat</button>
        <button id="sendBtn">Send</button>
    </div>
    <div id="user-console" style="background: #333; padding: 10px; color: #0f0; font-family: monospace;">
    <p style="margin: 0 0 5px 0;">> Local JS Console (Only for you)</p>
    <textarea id="localCode" placeholder="Write JS here... (e.g. document.body.style.filter = 'invert(1)')" style="width: 100%; height: 60px; background: #000; color: #0f0; border: 1px solid #444;"></textarea>
    <button id="applyLocal">Run & Save</button>
    <button id="resetLocal" style="background: #500;">Reset</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBb7JblJFreOwTnKXFFZNxWhDqabWqKD1g",
            authDomain: "fdmessage-cloud.firebaseapp.com",
            projectId: "fdmessage-cloud",
            storageBucket: "fdmessage-cloud.firebasestorage.app",
            messagingSenderId: "82562053397",
            databaseURL: "https://fdmessage-cloud-default-rtdb.firebaseio.com/",
            appId: "1:82562053397:web:85eea15ebda7780c45e51c"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        firebase.auth().signInAnonymously().catch(e => console.error(e));

        const chatWindow = document.querySelector('#chat-window');
        const sendBtn = document.querySelector('#sendBtn');
        const inp = document.querySelector('input');
        const isFriendCheck = document.querySelector('#isFriend');
        const downloadBtn = document.getElementById('download-btn');
        let allMessages = [];

        const myColorPicker = document.getElementById('myColor');
        const friendColorPicker = document.getElementById('friendColor');

        const codeEditor = document.getElementById('codeEditor');
        
        function renderMessage(msgData) {
        if (!msgData || !msgData.text) return;

        const newMessage = document.createElement('div');
        newMessage.className = msgData.isFriend ? 'friend' : 'box';
            
        newMessage.innerHTML = `
            <div style="font-size: 10px; opacity: 0.7; margin-bottom: 4px;">
                ${msgData.isFriend ? 'Friend' : 'Me'}
                </div>
                <div>${msgData.text}</div>
                <div style="font-size: 9px; text-align: right; opacity: 0.5; margin-top: 4px;">
                    ${msgData.time || ''}
                 </div>
                `;

            newMessage.onclick = () => {
                if (confirm("Delete a visual?")) newMessage.remove();
            };

            chatWindow.appendChild(newMessage);
            allMessages.push(msgData);
            
            window.scrollTo(0, document.body.scrollHeight);
            }

            sendBtn.onclick = function() {
            const text = inp.value.trim();
            if (!firebase.auth().currentUser) {
            console.log("Re-logging in...");
            firebase.auth().signInAnonymously();
            }
            sendBtn.disabled = true;
            setTimeout(() => {
            sendBtn.disabled = false; 
            }, 2000);

            if (text !== "") {
            const isFriendCheck = document.querySelector('#isFriend');
            const data = {
            text: text,
            isFriend: isFriendCheck.checked,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            id: String(Date.now())
            };

    
       db.ref('messages').push(data)
       .then(() => {
       inp.value = "";
       })
       .catch((error) => {
       console.warn("Firebase record error:", error.message);
       });
       }
       };

 
       inp.onkeydown = (e) => { 
       if (e.key === 'Enter') {
       e.preventDefault(); 
       sendBtn.click(); 
       }
       };

        inp.onkeydown = (e) => { 
            if (e.key === 'Enter') sendBtn.click(); 
        };

        db.ref('messages').on('child_added', (snapshot) => {
        console.log("Data received:", snapshot.val());
        renderMessage(snapshot.val());
        });

        downloadBtn.onclick = () => {
        let txt = allMessages.map(m => `[${m.time}] ${m.isFriend ? 'Friend' : 'Me'}: ${m.text}`).join('\n');
        const blob = new Blob([txt], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'chat.txt';
        a.click();
        };
        const localArea = document.getElementById('localCode');
        const applyBtn = document.getElementById('applyLocal');
        const resetBtn = document.getElementById('resetLocal');

        function runCustomCode(code) {
        try {
        eval(code);
        } catch (e) {
        console.error("Custom code error:", e);
        }
        }

        applyBtn.onclick = () => {
        const code = localArea.value;
        localStorage.setItem('myCustomJS', code); 
        runCustomCode(code);
        alert("Applied locally!");
        };
        
        resetBtn.onclick = () => {
        localStorage.removeItem('myCustomJS');
        location.reload(); 
        };
        
        window.addEventListener('load', () => {
        const savedCode = localStorage.getItem('myCustomJS');
        if (savedCode) {
        localArea.value = savedCode;
        runCustomCode(savedCode);
        }
        });
    </script>
</body>
</html>
