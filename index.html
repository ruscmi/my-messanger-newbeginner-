<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FDMessage</title>
    <style>
        .console-toggle {
        background: #444;
        color: #0f0;
        border: 1px solid #0f0;
        padding: 5px 10px;
        font-family: monospace;
        cursor: pointer;
        font-size: 12px;
        }
        #user-console {
        display: none; 
        position: fixed;
        bottom: 60px; 
        left: 10px;
        right: 10px;
        background: rgba(34, 34, 34, 0.95);
        padding: 15px;
        border: 2px solid #0f0;
        border-radius: 10px;
        z-index: 1000;
        box-shadow: 0 -5px 20px rgba(0,255,0,0.2);
        }
        #user-console.active {
        display: block;
        }

        #localCode {
        width: 100%;
        height: 100px;
        background: #000;
        color: #0f0;
        border: 1px solid #0f0;
        font-family: monospace;
        box-sizing: border-box;
        margin-bottom: 10px;
        }
        body {
        background-color: #f0f0f0;
        margin: 0;
        padding: 0;
        }
        #chat-window {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-bottom: 100px;
        }
        .input-bar {
            z-index: 100;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: darkcyan;
            padding: 10px;
            display: flex;
            gap: 10px;
            border-top: 1px solid rgb(86, 86, 86);
            box-sizing: border-box;
        }
        .input-bar input {
            flex-grow: 1;
            border-radius: 10px;
            padding: 10px;
            border: none;
            font-family: sans-serif;
            font-size: 20px;
        }
        button {
            background-color: rgb(0, 183, 183);
            border: none;
            padding: 8px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            font-size: 20px;
        }
        button:hover {
            background-color: lightcyan;
            color: black;
            transform: scale(1.1);
        }
        .box, .friend {
            font-family: sans-serif;
            padding: 10px;
            width: fit-content;
            max-width: 70%;
            word-wrap: break-word;
            animation: popIn 0.3s ease-out;
            transition: 0.2s;
            font-size: 20px;
        }
        .box {
            background-color: cadetblue;
            color: white;
            margin-right: auto;
            border-radius: 18px 18px 18px 2px;
        }
        .box:hover, .friend:hover {
            background-color: rgb(22, 192, 192); 
            transform: scale(1.05);
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
        }  
        .friend {
            background-color: cadetblue;
            color: white;
            margin-left: auto;
            border-radius: 18px 18px 2px 18px;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>
    
    <div id="chat-window"></div>

    <div id="user-console">
    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
    <span style="color: #0f0;">>TERMINAL</span>
    <button onclick="document.getElementById('user-console').classList.remove('active')" style="background:none; color:red;">[X]</button>
    </div>
    <textarea id="localCode" placeholder="//Change to Javascript only"></textarea>
    <div style="display: flex; gap: 10px;">
    <button id="applyLocal" style="flex-grow: 1; background: #0f0; color: #000;">RUN & SAVE</button>
    <button id="resetLocal" style="background: #500;">RESET</button>
    </div>
    </div>

    <div class="input-bar">
    <button class="console-toggle" id="toggleConsole">JS_</button>
    <input type="text" id="msgInput" placeholder="Message...">
    <button id="download-btn">Log</button>
    <button id="sendBtn">Send</button>
    </div>
    <div class="input-name" style="position:fixed; width: 100%; height: 100%; top: 0; left: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000;">
    <input type="text" id="userNameInput" placeholder="Nickname...">    
    <button id="confirmBtn">Continue</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyBb7JblJFreOwTnKXFFZNxWhDqabWqKD1g",
        authDomain: "fdmessage-cloud.firebaseapp.com",
        projectId: "fdmessage-cloud",
        storageBucket: "fdmessage-cloud.firebasestorage.app",
        messagingSenderId: "82562053397",
        databaseURL: "https://fdmessage-cloud-default-rtdb.firebaseio.com/",
        appId: "1:82562053397:web:85eea15ebda7780c45e51c"
    };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        firebase.auth().signInAnonymously().catch(e => console.error(e));

        const chatWindow = document.querySelector('#chat-window');
        const sendBtn = document.querySelector('#sendBtn');
        const inp = document.querySelector('#msgInput');
        const downloadBtn = document.getElementById('download-btn');
        let allMessages = [];

        let myNickname = localStorage.getItem("Saved nick") || "anon";
        let myColor = localStorage.getItem("UserColor") || '#' + Math.floor(Math.random()*16777215).toString(16);
    
        if (!localStorage.getItem("UserColor")) {
        localStorage.setItem("UserColor", myColor);
        }


        window.addEventListener('load', () => {
        if (localStorage.getItem("Saved nick")) {
        const namePanel = document.querySelector('.input-name');
        if (namePanel) namePanel.remove();
        }
        });

        function renderMessage(msgData) {
        if (!msgData || !msgData.text) return;

        const currentUid = firebase.auth().currentUser ? firebase.auth().currentUser.uid : null;
        const isMe = msgData.uid === currentUid; 

        const newMessage = document.createElement('div');
        
        newMessage.style.backgroundColor = msgData.color || 'cadetblue';
        newMessage.style.color = 'white';
        newMessage.style.padding = '10px';
        newMessage.style.borderRadius = isMe ? '18px 18px 2px 18px' : '18px 18px 18px 2px';
        newMessage.style.margin = isMe ? '0 0 0 auto' : '0 auto 0 0'; 
        newMessage.style.maxWidth = '70%';
        newMessage.style.width = 'fit-content';
        newMessage.style.marginBottom = '10px';
        newMessage.style.fontFamily = 'sans-serif';

        newMessage.innerHTML = `
        <div style="font-size: 10px; opacity: 0.8; margin-bottom: 4px; font-weight: bold;">
        ${msgData.name || 'Unknown'}
        </div>
        <div style="font-size: 18px;">${msgData.text}</div>
        <div style="font-size: 9px; text-align: right; opacity: 0.6; margin-top: 4px;">
        ${msgData.time || ''}
        </div>
        `;

        newMessage.onclick = () => {
        if (confirm("Delete a visual?")) newMessage.remove();
        };

        chatWindow.appendChild(newMessage);
        allMessages.push(msgData);
        window.scrollTo(0, document.body.scrollHeight);
        }

        sendBtn.onclick = function() {
        const text = inp.value.trim();
        if (text === "") return;

        if (!firebase.auth().currentUser) {
            firebase.auth().signInAnonymously();
        }

        const data = {
        name: myNickname,
        text: text,
        color: myColor,
        uid: firebase.auth().currentUser ? firebase.auth().currentUser.uid : 'anon', 
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        id: String(Date.now())
        };

        db.ref('messages').push(data)
            .then(() => { inp.value = ""; })
            .catch((e) => console.warn(e));
        };

        inp.onkeydown = (e) => { 
        if (e.key === 'Enter') sendBtn.click(); 
        };

        db.ref('messages').on('child_added', (snapshot) => {
        renderMessage(snapshot.val());
        });


        document.getElementById('confirmBtn').onclick = function() {
        const inputField = document.getElementById('userNameInput');
        if (inputField.value.trim() !== "") {
        myNickname = inputField.value;
        localStorage.setItem("Saved nick", myNickname);
        document.querySelector('.input-name').remove();
        } else {
            alert("Enter your name!");
        }
        };

        downloadBtn.onclick = () => {
        let txt = allMessages.map(m => `[${m.time}] ${m.name}: ${m.text}`).join('\n');
        const blob = new Blob([txt], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'chat.txt';
        a.click();
        };

        const localArea = document.getElementById('localCode');
        const toggleBtn = document.getElementById('toggleConsole');
        const consolePanel = document.getElementById('user-console');
    
        toggleBtn.onclick = () => consolePanel.classList.toggle('active');

        document.getElementById('applyLocal').onclick = () => {
        localStorage.setItem('myCustomJS', localArea.value);
        eval(localArea.value);
        alert("Applied!");
        };

        document.getElementById('resetLocal').onclick = () => {
        localStorage.removeItem('myCustomJS');
        location.reload();
    };
    </script>
</body>
</html>
